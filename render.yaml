# Render Blueprint — деплой одним кликом (https://render.com).
# В дашборде New + → Blueprint → выбрать этот репозиторий.
# Перед деплоем создайте бесплатную БД MongoDB Atlas и впишите её строку
# подключения в переменную MONGODB_URL (см. docs/deploy_guide.md).
services:
  - type: web
    name: local-services-map
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGODB_URL
        sync: false          # секрет — задаётся вручную в дашборде Render
      - key: MONGODB_DB_NAME
        value: local_services_map
      - key: JWT_SECRET_KEY
        generateValue: true  # Render сгенерирует случайный ключ
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: MAPTILER_API_KEY
        sync: false          # опционально; пусто = тайлы OSM
      - key: CACHE_TTL_DAYS
        value: "7"
      - key: DEBUG
        value: "false"
